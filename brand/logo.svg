<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Audio Visualizer">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A855F7"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#312E81"/>
      <stop offset="1" stop-color="#0B0D14"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="512" height="512" rx="112" fill="#0B0D14"/>

  <!-- radial spectrum ring -->
  <g stroke="url(#g)" stroke-width="28" stroke-linecap="round" filter="url(#glow)">
    <line x1="256.0" y1="148.0" x2="256.0" y2="64.0" />
    <line x1="297.3" y1="156.2" x2="322.5" y2="95.5" />
    <line x1="332.4" y1="179.6" x2="387.7" y2="124.3" />
    <line x1="355.8" y1="214.7" x2="409.4" y2="192.4" />
    <line x1="364.0" y1="256.0" x2="445.6" y2="256.0" />
    <line x1="355.8" y1="297.3" x2="413.4" y2="321.2" />
    <line x1="332.4" y1="332.4" x2="382.9" y2="382.9" />
    <line x1="297.3" y1="355.8" x2="318.5" y2="406.8" />
    <line x1="256.0" y1="364.0" x2="256.0" y2="419.2" />
    <line x1="214.7" y1="355.8" x2="187.3" y2="421.9" />
    <line x1="179.6" y1="332.4" x2="135.5" y2="376.5" />
    <line x1="156.2" y1="297.3" x2="80.8" y2="328.6" />
    <line x1="148.0" y1="256.0" x2="89.9" y2="256.0" />
    <line x1="156.2" y1="214.7" x2="83.9" y2="184.7" />
    <line x1="179.6" y1="179.6" x2="133.1" y2="133.1" />
    <line x1="214.7" y1="156.2" x2="182.5" y2="78.6" />
  </g>

  <!-- glowing core -->
  <circle cx="256" cy="256" r="78" fill="url(#core)"/>
  <circle cx="256" cy="256" r="78" fill="none" stroke="url(#g)" stroke-width="10" filter="url(#glow)"/>
</svg>
